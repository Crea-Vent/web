<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transport Leac3</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #0d1117;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
    }

    /* Pages */
    .page {
      display: none;
      flex: 1;
      justify-content: center;
      align-items: center;
    }

    .page.active {
      display: flex;
    }

    .page h1 {
      font-size: 3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Barre de navigation bas */
    nav {
      display: flex;
      background-color: #161b22;
      border-top: 1px solid #30363d;
    }

    nav button {
      flex: 1;
      padding: 14px 0;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    nav button.active {
      color: #ffffff;
      border-top: 2px solid #ffffff;
    }

    nav button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- Page Accueil -->
  <div class="page active" id="page-accueil">
    <h1>Transport Leac3</h1>
  </div>

  <!-- Page Entretien -->
  <div class="page" id="page-entretien">
    <h1>Entretien</h1>
  </div>

  <!-- Navigation -->
  <nav>
    <button class="active" id="btn-accueil" onclick="showPage('accueil')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      Accueil
    </button>
    <button id="btn-entretien" onclick="showPage('entretien')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.78 15.3 19.78 21.3 21.89 19.14 15.89 13.14 13.78 15.3M17.5 10.1C17.11 10.1 16.69 10.05 16.36 9.91L4.97 21.25 2.86 19.14 11 11 8.5 8.5 7.46 9.54 6.04 8.12V11.46L5.33 12.17 1.21 8.05 1.92 7.34H5.26L3.84 5.92 7.77 2C8.76 1 10.07 .5 11.38 .5 12.09 .5 12.8 .65 13.44 .94L10.28 4.1 10.28 4.1 13.44 7.26 16.6 4.1C16.87 4.75 17 5.43 17 6.1 17 8.32 15.45 10.1 13.78 10.1H17.5Z"/>
      </svg>
      Entretien
    </button>
  </nav>

  <script>
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.getElementById('btn-' + name).classList.add('active');
    }
  </script>

</body>
</html>
