<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transports Leac°</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #0d1117;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #21262d;
    }

    .header-brand h1 {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-brand h1 span.dot {
      color: #4a90d9;
      font-size: 1rem;
    }

    .header-brand p {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: #8b949e;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Pages ── */
    .page {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .page.active {
      display: flex;
    }

    /* ── Page Accueil ── */
    .page-content {
      padding: 24px 20px;
      flex: 1;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 16px;
    }

    /* Carte Bonjour */
    .card-bonjour {
      background: linear-gradient(135deg, #161b22 60%, #1c2a3e);
      border-radius: 16px;
      padding: 28px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      overflow: hidden;
      position: relative;
    }

    .card-bonjour .card-text p {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .card-bonjour .card-text h2 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .card-bonjour .card-text h2 span.dot {
      color: #4a90d9;
    }

    .card-bonjour .card-text .dash {
      width: 28px;
      height: 3px;
      background-color: #4a90d9;
      margin-top: 14px;
      border-radius: 2px;
    }

    .card-bonjour .card-icon {
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #1e3a5f 0%, #111827 70%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      flex-shrink: 0;
    }

    /* Section Actualités */
    .actualites-empty {
      color: #4b5563;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
    }

    /* ── Page Entretien ── */
    #page-entretien .page-content {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
    }

    #page-entretien .page-content p {
      color: #4b5563;
      font-size: 0.9rem;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      background-color: #161b22;
      border-top: 1px solid #30363d;
    }

    nav button {
      flex: 1;
      padding: 14px 0;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav button.active {
      color: #ffffff;
      border-top: 2px solid #4a90d9;
    }

    nav button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-brand">
      <h1>Transports Leac<span class="dot">°</span></h1>
      <p>Gestion Flotte &amp; Maintenance</p>
    </div>
  </header>

  <!-- Page Accueil -->
  <div class="page active" id="page-accueil">
    <div class="page-content">

      <p class="section-title">Tableau de bord</p>

      <div class="card-bonjour">
        <div class="card-text">
          <p>Bonjour,</p>
          <h2>Salarié Leac<span class="dot">°</span></h2>
          <div class="dash"></div>
        </div>
        <div class="card-icon">🚛</div>
      </div>

      <p class="section-title">Actualités</p>
      <p class="actualites-empty">Aucune actualité pour le moment.</p>

    </div>
  </div>

  <!-- Page Entretien -->
  <div class="page" id="page-entretien">
    <div class="page-content">
      <p>Contenu Entretien à venir.</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <button class="active" id="btn-accueil" onclick="showPage('accueil')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Accueil
    </button>
    <button id="btn-entretien" onclick="showPage('entretien')">
      <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      Entretien
    </button>
  </nav>

  <script>
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.getElementById('btn-' + name).classList.add('active');
    }
  </script>

</body>
</html>
