<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transports LEAC°</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #f4f6fb;
      font-family: 'Open Sans', sans-serif;
      color: #1a1a2e;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 20px 20px 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #e0e7f3;
      box-shadow: 0 1px 4px rgba(30,80,200,0.06);
    }

    .header-brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a2e;
    }

    .header-brand h1 span.dot { color: #1e50c8; }

    /* ── Pages ── */
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }

    .page-content {
      padding: 24px 20px;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7b93c8;
      margin-bottom: 16px;
    }

    /* ── Carte Bonjour ── */
    .card-bonjour {
      background: linear-gradient(135deg, #1e50c8 0%, #2e6be6 100%);
      border-radius: 18px;
      padding: 28px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      box-shadow: 0 6px 24px rgba(30,80,200,0.25);
      overflow: hidden;
    }

    .card-bonjour .card-text p {
      font-family: 'Open Sans', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 6px;
    }

    .card-bonjour .card-text h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .card-bonjour .card-text .dash {
      width: 28px;
      height: 3px;
      background-color: rgba(255,255,255,0.6);
      margin-top: 14px;
      border-radius: 2px;
    }

    .card-bonjour .card-icon {
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      flex-shrink: 0;
    }

    /* ── Fiches liste ── */
    .fiches-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fiche-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px 18px;
      border: 1px solid #e0e7f3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(30,80,200,0.06);
    }

    .fiche-card .fiche-info p {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .fiche-card .fiche-info span {
      font-size: 0.75rem;
      color: #7b93c8;
    }

    .btn-pdf {
      background-color: #1e50c8;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.2s;
    }

    .btn-pdf:active { background-color: #163ea0; }

    .fiches-empty {
      font-family: 'Open Sans', sans-serif;
      color: #b0bcd6;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 8px;
    }

    /* ── Formulaire Entretien ── */
    .form-entretien {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4a6ab0;
    }

    .form-group input,
    .form-group textarea {
      font-family: 'Open Sans', sans-serif;
      background-color: #ffffff;
      border: 1.5px solid #dce6f5;
      border-radius: 10px;
      padding: 14px 16px;
      color: #1a1a2e;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1e50c8;
      box-shadow: 0 0 0 3px rgba(30,80,200,0.1);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #b0bcd6; }

    .form-group textarea { resize: none; height: 90px; }

    .btn-submit {
      margin-top: 8px;
      padding: 16px;
      background-color: #1e50c8;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(30,80,200,0.3);
      transition: background-color 0.2s;
    }

    .btn-submit:disabled {
      background-color: #7b93c8;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1e50c8;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 50px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(30,80,200,0.3);
      z-index: 100;
    }

    .toast.show { opacity: 1; }

    /* ── Nav ── */
    nav {
      display: flex;
      background-color: #ffffff;
      border-top: 1px solid #e0e7f3;
      box-shadow: 0 -1px 6px rgba(30,80,200,0.06);
    }

    nav button {
      flex: 1;
      padding: 14px 0;
      background: none;
      border: none;
      color: #b0bcd6;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav button.active {
      color: #1e50c8;
      border-top: 2px solid #1e50c8;
    }

    nav button svg { width: 22px; height: 22px; fill: currentColor; }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <h1>Transports LEAC<span class="dot">°</span></h1>
    </div>
  </header>

  <!-- Page Accueil -->
  <div class="page active" id="page-accueil">
    <div class="page-content">

      <p class="section-title">Tableau de bord</p>

      <div class="card-bonjour">
        <div class="card-text">
          <p>Bonjour,</p>
          <h2>Salarié LEAC°</h2>
          <div class="dash"></div>
        </div>
        <div class="card-icon">🚛</div>
      </div>

      <p class="section-title">Fiches entretien</p>
      <div class="fiches-list" id="fiches-list">
        <p class="fiches-empty">Chargement...</p>
      </div>

    </div>
  </div>

  <!-- Page Entretien -->
  <div class="page" id="page-entretien">
    <div class="page-content">

      <p class="section-title">Nouvelle fiche entretien</p>

      <form class="form-entretien" id="form-entretien" onsubmit="submitFiche(event)">

        <div class="form-group">
          <label>Nom – Prénom du salarié</label>
          <input type="text" id="f-nom" placeholder="Ex : Dupont Jean" required>
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date" required>
        </div>

        <div class="form-group">
          <label>Fournisseur</label>
          <input type="text" id="f-fournisseur" placeholder="Ex : Garage Martin" required>
        </div>

        <div class="form-group">
          <label>Cause de la réparation</label>
          <textarea id="f-cause" placeholder="Décrivez la cause de la réparation…" required></textarea>
        </div>

        <div class="form-group">
          <label>Temps passé</label>
          <input type="text" id="f-temps" placeholder="Ex : 2h30" required>
        </div>

        <button class="btn-submit" type="submit" id="btn-submit">Enregistrer</button>

      </form>

    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <button class="active" id="btn-accueil" onclick="showPage('accueil')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Accueil
    </button>
    <button id="btn-entretien" onclick="showPage('entretien')">
      <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      Entretien
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    // ── Firebase init ──
    const firebaseConfig = {
      apiKey: "AIzaSyDkprRkes8a4-VMS4BiiFYQllUlglo_5Q8",
      authDomain: "transports-leac.firebaseapp.com",
      projectId: "transports-leac",
      storageBucket: "transports-leac.firebasestorage.app",
      messagingSenderId: "939447553141",
      appId: "1:939447553141:web:e6a38db459e38a74a0fc3c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── Navigation ──
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.getElementById('btn-' + name).classList.add('active');
    }

    // ── Toast ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Soumettre une fiche ──
    async function submitFiche(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';

      const fiche = {
        nom:        document.getElementById('f-nom').value.trim(),
        date:       document.getElementById('f-date').value,
        fournisseur:document.getElementById('f-fournisseur').value.trim(),
        cause:      document.getElementById('f-cause').value.trim(),
        temps:      document.getElementById('f-temps').value.trim(),
        createdAt:  firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection('fiches').add(fiche);
        document.getElementById('form-entretien').reset();
        showToast('Fiche enregistrée !');
        showPage('accueil');
      } catch (err) {
        showToast('Erreur lors de l\'envoi.');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enregistrer';
      }
    }

    // ── Charger les fiches en temps réel ──
    db.collection('fiches').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
      const list = document.getElementById('fiches-list');
      if (snapshot.empty) {
        list.innerHTML = '<p class="fiches-empty">Aucune fiche enregistrée.</p>';
        return;
      }
      list.innerHTML = '';
      snapshot.forEach(doc => {
        const f = doc.data();
        const card = document.createElement('div');
        card.className = 'fiche-card';
        card.innerHTML = `
          <div class="fiche-info">
            <p>${f.nom}</p>
            <span>${f.date} — ${f.fournisseur}</span>
          </div>
          <button class="btn-pdf" onclick="downloadPDF(${JSON.stringify(f).replace(/"/g, '&quot;')})">PDF</button>
        `;
        list.appendChild(card);
      });
    });

    // ── Générer le PDF ──
    function downloadPDF(f) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFillColor(30, 80, 200);
      doc.rect(0, 0, 210, 30, 'F');

      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.text('TRANSPORTS LEAC\u00B0', 14, 12);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text('FICHE D\'ENTRETIEN', 14, 22);

      doc.setTextColor(30, 80, 200);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');

      const fields = [
        ['Nom \u2013 Pr\u00E9nom du salari\u00E9', f.nom],
        ['Date', f.date],
        ['Fournisseur', f.fournisseur],
        ['Cause de la r\u00E9paration', f.cause],
        ['Temps pass\u00E9', f.temps],
      ];

      let y = 50;
      fields.forEach(([label, value]) => {
        doc.setTextColor(30, 80, 200);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.text(label.toUpperCase(), 14, y);
        y += 7;
        doc.setTextColor(26, 26, 46);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(11);
        const lines = doc.splitTextToSize(value || '-', 180);
        doc.text(lines, 14, y);
        y += lines.length * 7 + 8;
        doc.setDrawColor(224, 231, 243);
        doc.line(14, y - 4, 196, y - 4);
      });

      doc.save(`fiche-entretien-${f.nom.replace(/\s+/g, '-').toLowerCase()}.pdf`);
    }
  </script>

</body>
</html>
