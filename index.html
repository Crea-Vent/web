<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transports LEAC°</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #f4f6fb;
      font-family: 'Open Sans', sans-serif;
      color: #1a1a2e;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      background-color: #ffffff;
      border-bottom: 1px solid #e0e7f3;
      box-shadow: 0 1px 4px rgba(30,80,200,0.06);
    }

    .header-brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a2e;
    }

    .header-brand h1 span.dot { color: #1e50c8; }

    /* ── Pages ── */
    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }

    .page-content {
      padding: 22px 18px;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7b93c8;
      margin-bottom: 14px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-header .section-title { margin-bottom: 0; }

    /* ── Carte Bonjour ── */
    .card-bonjour {
      background: linear-gradient(135deg, #1e50c8 0%, #2e6be6 100%);
      border-radius: 18px;
      padding: 24px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      box-shadow: 0 6px 24px rgba(30,80,200,0.25);
      overflow: hidden;
    }

    .card-bonjour .card-text p {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 4px;
    }

    .card-bonjour .card-text h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .card-bonjour .card-text .card-date {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
    }

    .card-bonjour .card-icon {
      width: 86px;
      height: 86px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      flex-shrink: 0;
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #e0e7f3;
      box-shadow: 0 2px 8px rgba(30,80,200,0.05);
    }

    .stat-card .stat-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7b93c8;
      margin-bottom: 8px;
    }

    .stat-card .stat-number {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: #1e50c8;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card .stat-desc {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.75rem;
      color: #7b93c8;
    }

    /* ── Actualités ── */
    .actu-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .actu-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #e0e7f3;
      border-left: 4px solid #1e50c8;
      box-shadow: 0 2px 8px rgba(30,80,200,0.05);
    }

    .actu-card.cat-annonce   { border-left-color: #1e50c8; }
    .actu-card.cat-meteo     { border-left-color: #22c55e; }
    .actu-card.cat-rh        { border-left-color: #8b5cf6; }
    .actu-card.cat-urgence   { border-left-color: #ef4444; }

    .actu-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .actu-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .actu-badge.cat-annonce { background: #e8eeff; color: #1e50c8; }
    .actu-badge.cat-meteo   { background: #dcfce7; color: #16a34a; }
    .actu-badge.cat-rh      { background: #ede9fe; color: #7c3aed; }
    .actu-badge.cat-urgence { background: #fee2e2; color: #dc2626; }

    .actu-date {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.72rem;
      color: #b0bcd6;
    }

    .actu-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .actu-body {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.82rem;
      color: #5a6a8a;
      line-height: 1.5;
    }

    .actu-empty {
      font-family: 'Open Sans', sans-serif;
      color: #b0bcd6;
      font-size: 0.85rem;
      text-align: center;
      padding: 20px 0;
    }

    /* Bouton + */
    .btn-add {
      width: 32px;
      height: 32px;
      background-color: #1e50c8;
      color: #ffffff;
      border: none;
      border-radius: 50%;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(30,80,200,0.3);
      flex-shrink: 0;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,20,60,0.4);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #ffffff;
      border-radius: 24px 24px 0 0;
      padding: 28px 20px 36px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 -8px 40px rgba(30,80,200,0.15);
    }

    .modal-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1a1a2e;
      margin-bottom: 20px;
    }

    .modal .form-group { margin-bottom: 16px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      background: #f0f4ff;
      color: #1e50c8;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ── Fiches ── */
    .fiches-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fiche-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px 18px;
      border: 1px solid #e0e7f3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(30,80,200,0.06);
    }

    .fiche-card .fiche-info p {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .fiche-card .fiche-info span {
      font-size: 0.75rem;
      color: #7b93c8;
    }

    .btn-pdf {
      background-color: #1e50c8;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .fiches-empty {
      font-family: 'Open Sans', sans-serif;
      color: #b0bcd6;
      font-size: 0.85rem;
      text-align: center;
      padding: 20px 0;
    }

    /* ── Formulaire Entretien ── */
    .form-entretien { display: flex; flex-direction: column; gap: 20px; }

    .form-group { display: flex; flex-direction: column; gap: 8px; }

    .form-group label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4a6ab0;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      font-family: 'Open Sans', sans-serif;
      background-color: #ffffff;
      border: 1.5px solid #dce6f5;
      border-radius: 10px;
      padding: 14px 16px;
      color: #1a1a2e;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      appearance: none;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #1e50c8;
      box-shadow: 0 0 0 3px rgba(30,80,200,0.1);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #b0bcd6; }

    .form-group textarea { resize: none; height: 90px; }

    .btn-submit {
      margin-top: 8px;
      padding: 16px;
      background-color: #1e50c8;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(30,80,200,0.3);
      width: 100%;
    }

    .btn-submit:disabled { background-color: #7b93c8; cursor: not-allowed; box-shadow: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1a1a2e;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 50px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 100;
    }

    .toast.show { opacity: 1; }

    /* ── Nav ── */
    nav {
      display: flex;
      background-color: #ffffff;
      border-top: 1px solid #e0e7f3;
      box-shadow: 0 -1px 6px rgba(30,80,200,0.06);
    }

    nav button {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      color: #b0bcd6;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav button.active { color: #1e50c8; border-top: 2px solid #1e50c8; }
    nav button svg { width: 22px; height: 22px; fill: currentColor; }

    /* ── Bouton admin header ── */
    .btn-admin {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f0f4ff;
      border: 1.5px solid #c7d7f5;
      border-radius: 50px;
      padding: 7px 14px 7px 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1e50c8;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-admin svg { width: 16px; height: 16px; fill: #1e50c8; flex-shrink: 0; }
    .btn-admin.connected { background: #1e50c8; color: #fff; border-color: #1e50c8; }
    .btn-admin.connected svg { fill: #fff; }

    /* ── Modal login ── */
    .login-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,20,60,0.4);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-overlay.open { display: flex; }

    .login-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(30,80,200,0.18);
    }

    .login-box .login-icon {
      font-size: 2.4rem;
      text-align: center;
      margin-bottom: 12px;
    }

    .login-box h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .login-box p.login-sub {
      font-size: 0.8rem;
      color: #7b93c8;
      text-align: center;
      margin-bottom: 24px;
    }

    .login-error {
      font-size: 0.78rem;
      color: #dc2626;
      text-align: center;
      margin-top: -8px;
      margin-bottom: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <h1>Transports LEAC<span class="dot">°</span></h1>
    </div>
    <button class="btn-admin" id="btn-admin-header" onclick="toggleAdmin()">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      <span id="admin-label">Admin</span>
    </button>
  </header>

  <!-- ── Page Accueil ── -->
  <div class="page active" id="page-accueil">
    <div class="page-content">

      <p class="section-title">Tableau de bord</p>

      <div class="card-bonjour">
        <div class="card-text">
          <p>Bonjour,</p>
          <h2>Salarié LEAC°</h2>
          <p class="card-date" id="today-date"></p>
        </div>
        <div class="card-icon">🚛</div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Ce mois</div>
          <div class="stat-number" id="stat-mois">—</div>
          <div class="stat-desc">entretiens effectués</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-number" id="stat-total">—</div>
          <div class="stat-desc">fiches enregistrées</div>
        </div>
      </div>

      <div class="section-header">
        <p class="section-title">Actualités</p>
        <button class="btn-add" onclick="openModal()" title="Ajouter une actualité">+</button>
      </div>
      <div class="actu-list" id="actu-list">
        <p class="actu-empty">Chargement...</p>
      </div>

    </div>
  </div>

  <!-- ── Page Entretien ── -->
  <div class="page" id="page-entretien">
    <div class="page-content">

      <p class="section-title">Nouvelle fiche entretien</p>

      <form class="form-entretien" id="form-entretien" onsubmit="submitFiche(event)">
        <div class="form-group">
          <label>Nom – Prénom du salarié</label>
          <input type="text" id="f-nom" placeholder="Ex : Dupont Jean" required>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date" required>
        </div>
        <div class="form-group">
          <label>Fournisseur</label>
          <input type="text" id="f-fournisseur" placeholder="Ex : Garage Martin" required>
        </div>
        <div class="form-group">
          <label>Cause de la réparation</label>
          <textarea id="f-cause" placeholder="Décrivez la cause de la réparation…" required></textarea>
        </div>
        <div class="form-group">
          <label>Temps passé</label>
          <input type="text" id="f-temps" placeholder="Ex : 2h30" required>
        </div>
        <button class="btn-submit" type="submit" id="btn-submit">Enregistrer</button>
      </form>

    </div>
  </div>

  <!-- ── Page Fiches ── -->
  <div class="page" id="page-fiches">
    <div class="page-content">
      <p class="section-title">Fiches enregistrées</p>
      <div class="fiches-list" id="fiches-list">
        <p class="fiches-empty">Chargement...</p>
      </div>
    </div>
  </div>

  <!-- ── Navigation ── -->
  <nav>
    <button class="active" id="btn-accueil" onclick="showPage('accueil')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Accueil
    </button>
    <button id="btn-entretien" onclick="showPage('entretien')">
      <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      Entretien
    </button>
    <button id="btn-fiches" onclick="showPage('fiches')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8v-2zm0-4h8v2H8v-2z"/></svg>
      Fiches
    </button>
  </nav>

  <!-- ── Modal Actualité ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <p class="modal-title">Nouvelle actualité</p>
      <form id="form-actu" onsubmit="submitActu(event)">
        <div class="form-group">
          <label>Catégorie</label>
          <select id="a-cat">
            <option value="annonce">📢 Annonce</option>
            <option value="meteo">🌤️ Météo &amp; Routes</option>
            <option value="rh">👥 RH &amp; Planning</option>
            <option value="urgence">🚨 Urgence</option>
          </select>
        </div>
        <div class="form-group">
          <label>Titre</label>
          <input type="text" id="a-titre" placeholder="Titre de l'actualité" required>
        </div>
        <div class="form-group">
          <label>Contenu</label>
          <textarea id="a-contenu" placeholder="Détails de l'actualité…" required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
          <button type="submit" class="btn-submit" id="btn-actu-submit" style="margin-top:0;flex:1.5">Publier</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Modal Login ── -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-icon">🔐</div>
      <h2>Espace Admin</h2>
      <p class="login-sub">Accès réservé à la secrétaire</p>
      <form onsubmit="doLogin(event)">
        <div class="form-group" style="margin-bottom:14px">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="email@transports-leac.fr" required>
        </div>
        <div class="form-group" style="margin-bottom:6px">
          <label>Mot de passe</label>
          <input type="password" id="login-pwd" placeholder="••••••••" required>
        </div>
        <p class="login-error" id="login-error"></p>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeLogin()">Annuler</button>
          <button type="submit" class="btn-submit" id="btn-login" style="margin-top:0;flex:1.5">Se connecter</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Firebase ──
    firebase.initializeApp({
      apiKey: "AIzaSyDkprRkes8a4-VMS4BiiFYQllUlglo_5Q8",
      authDomain: "transports-leac.firebaseapp.com",
      projectId: "transports-leac",
      storageBucket: "transports-leac.firebasestorage.app",
      messagingSenderId: "939447553141",
      appId: "1:939447553141:web:e6a38db459e38a74a0fc3c"
    });
    const db   = firebase.firestore();
    const auth = firebase.auth();

    // ── Auth state ──
    auth.onAuthStateChanged(user => {
      const btnHeader  = document.getElementById('btn-admin-header');
      const adminLabel = document.getElementById('admin-label');
      const navFiches  = document.getElementById('btn-fiches');
      const btnAdd     = document.querySelector('.btn-add');

      if (user) {
        btnHeader.classList.add('connected');
        adminLabel.textContent = 'Connecté';
        navFiches.style.display = '';
        if (btnAdd) btnAdd.style.display = '';
      } else {
        btnHeader.classList.remove('connected');
        adminLabel.textContent = 'Admin';
        navFiches.style.display = 'none';
        if (btnAdd) btnAdd.style.display = 'none';
        // Si on était sur la page fiches, retour accueil
        if (document.getElementById('page-fiches').classList.contains('active')) {
          showPage('accueil');
        }
      }
    });

    // ── Login ──
    function toggleAdmin() {
      if (auth.currentUser) {
        auth.signOut();
        showToast('Déconnexion réussie.');
      } else {
        document.getElementById('login-overlay').classList.add('open');
      }
    }

    function closeLogin() {
      document.getElementById('login-overlay').classList.remove('open');
      document.getElementById('login-error').textContent = '';
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      err.textContent = '';
      try {
        await auth.signInWithEmailAndPassword(
          document.getElementById('login-email').value.trim(),
          document.getElementById('login-pwd').value
        );
        closeLogin();
        showToast('Connecté en tant qu\'admin.');
      } catch {
        err.textContent = 'Email ou mot de passe incorrect.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    document.getElementById('login-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeLogin();
    });

    // ── Date du jour ──
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('fr-FR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    }).replace(/^\w/, c => c.toUpperCase());

    // ── Navigation ──
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.getElementById('btn-' + name).classList.add('active');
    }

    // ── Toast ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Modal ──
    function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ── Configs catégories ──
    const cats = {
      annonce: { label: '📢 Annonce',        cls: 'cat-annonce' },
      meteo:   { label: '🌤️ Météo & Routes', cls: 'cat-meteo'   },
      rh:      { label: '👥 RH & Planning',  cls: 'cat-rh'      },
      urgence: { label: '🚨 Urgence',         cls: 'cat-urgence' },
    };

    // ── Soumettre une actualité ──
    async function submitActu(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-actu-submit');
      btn.disabled = true;
      const actu = {
        categorie:  document.getElementById('a-cat').value,
        titre:      document.getElementById('a-titre').value.trim(),
        contenu:    document.getElementById('a-contenu').value.trim(),
        createdAt:  firebase.firestore.FieldValue.serverTimestamp()
      };
      try {
        await db.collection('actualites').add(actu);
        document.getElementById('form-actu').reset();
        closeModal();
        showToast('Actualité publiée !');
      } catch (err) {
        showToast('Erreur lors de la publication.');
      } finally {
        btn.disabled = false;
      }
    }

    // ── Charger actualités ──
    db.collection('actualites').orderBy('createdAt', 'desc').onSnapshot(snap => {
      const list = document.getElementById('actu-list');
      if (snap.empty) {
        list.innerHTML = '<p class="actu-empty">Aucune actualité pour le moment.</p>';
        return;
      }
      list.innerHTML = '';
      snap.forEach(doc => {
        const a = doc.data();
        const cat = cats[a.categorie] || cats.annonce;
        const date = a.createdAt ? a.createdAt.toDate().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }) : '';
        const card = document.createElement('div');
        card.className = `actu-card ${cat.cls}`;
        card.innerHTML = `
          <div class="actu-top">
            <span class="actu-badge ${cat.cls}">${cat.label}</span>
            <span class="actu-date">${date}</span>
          </div>
          <p class="actu-title">${a.titre}</p>
          <p class="actu-body">${a.contenu}</p>
        `;
        list.appendChild(card);
      });
    });

    // ── Soumettre une fiche entretien ──
    async function submitFiche(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';
      const fiche = {
        nom:         document.getElementById('f-nom').value.trim(),
        date:        document.getElementById('f-date').value,
        fournisseur: document.getElementById('f-fournisseur').value.trim(),
        cause:       document.getElementById('f-cause').value.trim(),
        temps:       document.getElementById('f-temps').value.trim(),
        createdAt:   firebase.firestore.FieldValue.serverTimestamp()
      };
      try {
        await db.collection('fiches').add(fiche);
        document.getElementById('form-entretien').reset();
        showToast('Fiche enregistrée !');
        showPage('accueil');
      } catch (err) {
        showToast('Erreur lors de l\'envoi.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enregistrer';
      }
    }

    // ── Charger fiches + stats ──
    db.collection('fiches').orderBy('createdAt', 'desc').onSnapshot(snap => {
      // Stats
      const now = new Date();
      let mois = 0;
      snap.forEach(doc => {
        const d = doc.data();
        if (d.createdAt) {
          const t = d.createdAt.toDate();
          if (t.getMonth() === now.getMonth() && t.getFullYear() === now.getFullYear()) mois++;
        }
      });
      document.getElementById('stat-total').textContent = snap.size;
      document.getElementById('stat-mois').textContent  = mois;

      // Liste fiches
      const list = document.getElementById('fiches-list');
      if (snap.empty) {
        list.innerHTML = '<p class="fiches-empty">Aucune fiche enregistrée.</p>';
        return;
      }
      list.innerHTML = '';
      snap.forEach(doc => {
        const f = doc.data();
        const card = document.createElement('div');
        card.className = 'fiche-card';
        card.innerHTML = `
          <div class="fiche-info">
            <p>${f.nom}</p>
            <span>${f.date} — ${f.fournisseur}</span>
          </div>
          <button class="btn-pdf" onclick="downloadPDF(${JSON.stringify(f).replace(/"/g, '&quot;')})">PDF</button>
        `;
        list.appendChild(card);
      });
    });

    // ── Générer PDF ──
    function downloadPDF(f) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFillColor(30, 80, 200);
      doc.rect(0, 0, 210, 30, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.text('TRANSPORTS LEAC\u00B0', 14, 12);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text('FICHE D\'ENTRETIEN', 14, 22);
      const fields = [
        ['Nom \u2013 Pr\u00E9nom du salari\u00E9', f.nom],
        ['Date', f.date],
        ['Fournisseur', f.fournisseur],
        ['Cause de la r\u00E9paration', f.cause],
        ['Temps pass\u00E9', f.temps],
      ];
      let y = 50;
      fields.forEach(([label, value]) => {
        doc.setTextColor(30, 80, 200);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.text(label.toUpperCase(), 14, y);
        y += 7;
        doc.setTextColor(26, 26, 46);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(11);
        const lines = doc.splitTextToSize(value || '-', 180);
        doc.text(lines, 14, y);
        y += lines.length * 7 + 8;
        doc.setDrawColor(224, 231, 243);
        doc.line(14, y - 4, 196, y - 4);
      });
      doc.save(`fiche-entretien-${f.nom.replace(/\s+/g, '-').toLowerCase()}.pdf`);
    }
  </script>

</body>
</html>
