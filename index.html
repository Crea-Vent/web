<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transports LEAC°</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #f4f6fb;
      font-family: 'Open Sans', sans-serif;
      color: #1a1a2e;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 20px 20px 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #e0e7f3;
      box-shadow: 0 1px 4px rgba(30, 80, 200, 0.06);
    }

    .header-brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a2e;
    }

    .header-brand h1 span.dot {
      color: #1e50c8;
    }

    /* ── Pages ── */
    .page {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .page.active {
      display: flex;
    }

    /* ── Page content ── */
    .page-content {
      padding: 24px 20px;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7b93c8;
      margin-bottom: 16px;
    }

    /* ── Carte Bonjour ── */
    .card-bonjour {
      background: linear-gradient(135deg, #1e50c8 0%, #2e6be6 100%);
      border-radius: 18px;
      padding: 28px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      box-shadow: 0 6px 24px rgba(30, 80, 200, 0.25);
      overflow: hidden;
    }

    .card-bonjour .card-text p {
      font-family: 'Open Sans', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 6px;
    }

    .card-bonjour .card-text h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .card-bonjour .card-text .dash {
      width: 28px;
      height: 3px;
      background-color: rgba(255,255,255,0.6);
      margin-top: 14px;
      border-radius: 2px;
    }

    .card-bonjour .card-icon {
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      flex-shrink: 0;
    }

    /* Section Actualités */
    .actualites-empty {
      font-family: 'Open Sans', sans-serif;
      color: #b0bcd6;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
    }

    /* ── Formulaire Entretien ── */
    .form-entretien {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4a6ab0;
    }

    .form-group input,
    .form-group textarea {
      font-family: 'Open Sans', sans-serif;
      background-color: #ffffff;
      border: 1.5px solid #dce6f5;
      border-radius: 10px;
      padding: 14px 16px;
      color: #1a1a2e;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1e50c8;
      box-shadow: 0 0 0 3px rgba(30, 80, 200, 0.1);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #b0bcd6;
    }

    .form-group textarea {
      resize: none;
      height: 90px;
    }

    .btn-submit {
      margin-top: 8px;
      padding: 16px;
      background-color: #1e50c8;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(30, 80, 200, 0.3);
    }

    .btn-submit:active {
      background-color: #163ea0;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      background-color: #ffffff;
      border-top: 1px solid #e0e7f3;
      box-shadow: 0 -1px 6px rgba(30, 80, 200, 0.06);
    }

    nav button {
      flex: 1;
      padding: 14px 0;
      background: none;
      border: none;
      color: #b0bcd6;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav button.active {
      color: #1e50c8;
      border-top: 2px solid #1e50c8;
    }

    nav button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-brand">
      <h1>Transports LEAC<span class="dot">°</span></h1>
    </div>
  </header>

  <!-- Page Accueil -->
  <div class="page active" id="page-accueil">
    <div class="page-content">

      <p class="section-title">Tableau de bord</p>

      <div class="card-bonjour">
        <div class="card-text">
          <p>Bonjour,</p>
          <h2>Salarié LEAC°</h2>
          <div class="dash"></div>
        </div>
        <div class="card-icon">🚛</div>
      </div>

      <p class="section-title">Actualités</p>
      <p class="actualites-empty">Aucune actualité pour le moment.</p>

    </div>
  </div>

  <!-- Page Entretien -->
  <div class="page" id="page-entretien">
    <div class="page-content">

      <p class="section-title">Nouvelle fiche entretien</p>

      <form class="form-entretien" onsubmit="return false;">

        <div class="form-group">
          <label>Nom – Prénom du salarié</label>
          <input type="text" placeholder="Ex : Dupont Jean">
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Fournisseur</label>
          <input type="text" placeholder="Ex : Garage Martin">
        </div>

        <div class="form-group">
          <label>Cause de la réparation</label>
          <textarea placeholder="Décrivez la cause de la réparation…"></textarea>
        </div>

        <div class="form-group">
          <label>Temps passé</label>
          <input type="text" placeholder="Ex : 2h30">
        </div>

        <button class="btn-submit" type="submit">Enregistrer</button>

      </form>

    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <button class="active" id="btn-accueil" onclick="showPage('accueil')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Accueil
    </button>
    <button id="btn-entretien" onclick="showPage('entretien')">
      <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      Entretien
    </button>
  </nav>

  <script>
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.getElementById('btn-' + name).classList.add('active');
    }
  </script>

</body>
</html>
